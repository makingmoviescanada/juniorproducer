<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Junior | The Producer's Second Brain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --parchment: #F0EBE0;
    --red: #E8392A;
    --red-hover: #C9301E;
    --ink: #1A1A1A;
    --white: #FFFFFF;
    --radius-ui: 0px;
    --shadow: 4px 4px 0px #1A1A1A;
    --shadow-hover: 6px 6px 0px #1A1A1A;
  }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--parchment);
    color: var(--ink);
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    background: var(--parchment);
    border-bottom: 1.5px solid var(--ink);
    padding: 0 7vw;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-wordmark {
    font-weight: 900;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink);
    text-decoration: none;
  }

  /* BUTTONS */
  .btn {
    font-family: 'Barlow', sans-serif;
    font-weight: 900;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    text-decoration: none;
    display: inline-block;
    cursor: pointer;
    border: 2px solid var(--ink);
    border-radius: var(--radius-ui);
    transition: all 150ms ease;
  }
  .btn-red {
    background: var(--red);
    color: var(--white);
    padding: 11px 24px;
    box-shadow: var(--shadow);
  }
  .btn-red:hover {
    background: var(--red-hover);
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
  }
  .btn-white {
    background: var(--white);
    color: var(--ink);
    padding: 15px 36px;
    box-shadow: var(--shadow);
  }
  .btn-white:hover {
    background: var(--parchment);
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
  }
  .btn-ink {
    background: var(--ink);
    color: var(--white);
    padding: 15px 36px;
    box-shadow: var(--shadow);
  }
  .btn-ink:hover {
    background: #2e2e2e;
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
  }

  /* HERO */
  .hero {
    background: var(--parchment);
    padding: 80px 7vw 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .hero-eyebrow {
    font-weight: 900;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--red);
    margin-bottom: 24px;
  }
  .hero-headline {
    font-weight: 900;
    font-size: clamp(42px, 6vw, 88px);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    line-height: 1.06;
    color: var(--ink);
    margin-bottom: 20px;
    max-width: 900px;
  }
  .hero-sub {
    font-weight: 400;
    font-size: 18px;
    line-height: 1.65;
    color: var(--ink);
    opacity: 0.7;
    margin-bottom: 48px;
    max-width: 540px;
  }
  .hero-join-btn {
    font-family: 'Barlow', sans-serif;
    font-weight: 900;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: var(--red);
    color: var(--white);
    border: 2px solid var(--ink);
    padding: 18px 56px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: all 150ms ease;
  }
  .hero-join-btn:hover {
    background: var(--red-hover);
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
  }

  /* FEATURE CARDS */
  .feature-cards {
    background: var(--red);
    padding: 80px 7vw 60px;
  }
  .section-label {
    font-weight: 900;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-bottom: 16px;
    display: block;
  }
  .label-on-red   { color: rgba(255,255,255,0.5); }
  .label-on-parch { color: var(--red); }
  .label-on-dark  { color: rgba(240,235,224,0.4); }

  .section-title {
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    line-height: 1.1;
  }
  .title-on-red   { color: var(--white); }
  .title-on-parch { color: var(--ink); }
  .title-on-dark  { color: var(--parchment); }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-top: 52px;
  }
  .feature-card {
    background: var(--parchment);
    border: 2.5px solid var(--ink);
    padding: 44px 36px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 16px;
    transition: box-shadow 150ms ease, transform 150ms ease;
  }
  .feature-card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
  }
  .card-icon {
    font-size: 28px;
    color: var(--red);
  }
  .card-headline {
    font-weight: 900;
    font-size: clamp(19px, 1.8vw, 24px);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    line-height: 1.12;
    color: var(--ink);
  }
  .card-body {
    font-weight: 400;
    font-size: 15px;
    line-height: 1.7;
    color: var(--ink);
    opacity: 0.68;
    flex: 1;
  }
  .card-cta {
    font-family: 'Barlow', sans-serif;
    font-weight: 900;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    background: var(--ink);
    color: var(--white);
    border: 2px solid var(--ink);
    padding: 14px 18px;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    display: block;
    box-shadow: var(--shadow);
    transition: all 150ms ease;
  }
  .card-cta:hover {
    background: #2e2e2e;
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
  }

  /* FUNDER PILLS — inside cards section */
  .funders-strip {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 48px;
    padding-top: 40px;
    border-top: 1.5px solid rgba(255,255,255,0.2);
  }
  .funder-name-pill {
    font-weight: 900;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.6);
    padding: 10px 18px;
    border: 1.5px solid rgba(255,255,255,0.25);
    white-space: nowrap;
  }

  /* FOUNDERS */
  .founders {
    background: var(--ink);
    padding: 80px 7vw;
  }
  .founders-intro {
    max-width: 700px;
    margin-bottom: 64px;
  }
  .founders-section-headline {
    font-size: clamp(28px, 3.5vw, 50px);
    margin-bottom: 24px;
  }
  .founders-body-text {
    font-weight: 400;
    font-size: 17px;
    line-height: 1.7;
    color: var(--parchment);
    opacity: 0.58;
  }
  .founders-grid {
    display: grid;
